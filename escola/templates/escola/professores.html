<!-- templates/escola/professores.html -->

{% extends "escola/base.html" %}

{% block content %}
<h2>Professores</h2>

<section>
    {% for prof in professores %}
    <article>
        <header>
            <h3> prof </h3>
        </header>

        <section>
            <h4>Cursos</h4>
            <ul>
                {% for curso in prof.cursos.all %}
                    <li>
                        <a href="{% url 'curso' curso.id %}">
                        {{ curso }}
                        </a>
                    </li>
               {% endfor %}
            </ul>
        </section>
    </article>
    {% endfor %}
</section>
{% endblock %}
